<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kulitan Digital Dictionary</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- =======================
       HEADER AREA
======================= -->  
<header>
  <div>
    <div class="home-title" data-i18n="home-title"></div>
    <div class="home-sub" data-i18n="home-sub"></div>
  </div>

  <nav>
    <a href="index.html" data-i18n="nav-home"></a>
    <a href="dictionary.html" data-i18n="nav-dictionary"></a>
    <a href="about.html" data-i18n="nav-about"></a>
    <a href="contact.html" data-i18n="nav-contact"></a>
  </nav>

  <div class="enkp">
    <button id="langToggle" data-i18n="langToggle"></button>
  </div>
</header>

<!-- =======================
       HERO SECTION
======================= -->
<section class="hero">
  <h1 data-i18n="dict-title"></h1>
  <p data-i18n="dict-sub"></p>
</section>

<!-- =======================
       SEARCH BAR
======================= -->
<section class="dictionary">
  <input id="searchInput" type="text" placeholder="Search..." data-i18n-placeholder="dict_search"
         style="padding:0.8rem 1.2rem;width:280px;border-radius:1rem;border:1px solid #aaa;font-size:1rem;">
</section>

<!-- =======================
       DICTIONARY ENTRIES
======================= -->
<section>
  <h2 data-i18n="dict-entries">Word List</h2>
  <div class="cards" id="dictionaryContainer" style="margin-top:2rem;">
    <!-- Words will be loaded here dynamically -->
  </div>
</section>

<!-- =======================
       COMMUNITY SECTION
======================= -->
<section class="community">
  <h2 data-i18n="section-bpr"></h2>
  <p data-i18n="section-jkka"></p>
  <button id="subscribeBtn" class="primary" data-i18n="subscribeBtn"></button>
</section>

<!-- =======================
       NIGHT MODE BUTTON
======================= -->
<div class="controls">
  <button id="nightBtn" class="night-btn" data-i18n="nightBtn"></button>
</div>

<!-- =======================
       FOOTER
======================= -->
<footer class="footer">
  <p data-i18n="footercreator"></p>
  <p data-i18n="footernote"></p>
</footer>

<script src="js/script.js"></script>
<script>
async function loadAllWords() {
  try {
    const response = await fetch("http://localhost:5000/api/words");
    const words = await response.json();
    const container = document.getElementById("dictionaryContainer");

    const wordCards = featuredWords.map(word => {
      return `<a href="${word.page}" class="card dict-item" data-word="${word.romanized} ${word.meaning}">
        <div class="card-content">
          <div class="word-text">
            <p><strong>${word.romanized}</strong> ${word.meaning}</p>
          </div>
          <div class="word-kulitan">
            <img src="${word.kulitan}" alt="Kulitan" class="kulitan-vector">
          </div>
        </div>
      </a>`;
    }).join('');


  } catch (err) {
    console.error("Error loading all words:", err);
  }
}

// Load all words when the page loads
loadAllWords();
</script>

</body>
</html>
