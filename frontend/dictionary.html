<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Kulitan Project</title>
  <link rel="icon" href="/SVG/KulitanFavicon.svg">

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <a class="home-brand" href="index.html">
    <img src="/SVG/KulitanFavicon.svg" alt="Kulitan Logo" class="home-logo" />

    <div class="home-text">
      <div class="home-title" data-i18n="home-title"></div>
      <div class="home-sub" data-i18n="home-sub"></div>
    </div>
  </a>

  <nav>
    <a href="index.html" data-i18n="nav-home"></a>
    <a href="dictionary.html" data-i18n="nav-dictionary"></a>
    <a href="about.html" data-i18n="nav-about"></a>
    <a href="references.html" data-i18n="nav-references"></a>
    <a href="contact.html" data-i18n="nav-contact"></a>
  </nav>

  <div class="enkp">
    <button id="langToggle" data-i18n="langToggle"></button>
  </div>
</header>

<section class="hero">
  <h1 data-i18n="dict-title"></h1>
  <p data-i18n="dict-sub"></p>
</section>

<section class="dictionary">
  <input
    id="searchInput"
    type="text"
    placeholder="Search..."
    data-i18n-placeholder="dict_search"
  >
</section>

<section id="letterFilter" class="letter-filter"></section>

<section class="dictionaryfeatured">
  <h2 data-i18n="featured-words">Featured Words</h2>
  <div class="cards" id="featuredWordsContainer"></div>
</section>

<section>
  <h2 data-i18n="dict-entries"></h2>
  <div class="cards" id="dictionaryContainer"></div>

  <div class="pagination">
    <button id="prevBtn" data-i18n="prev">Previous</button>
    <span id="pageInfo"></span>
    <button id="nextBtn" data-i18n="next">Next</button>
  </div>
</section>

<footer class="footer">
  <p data-i18n="footercreator"></p>
  <p data-i18n="footernote"></p>
</footer>

<div class="controls">
  <button id="nightBtn" class="night-btn" data-i18n="nightBtn"></button>
</div>


<script type="module">
import { initDictionaryPage } from "./js/pages/dictionaryPage.js";

window.addEventListener("DOMContentLoaded", () => {
  initDictionaryPage();
});
</script>

</body>
</html>
