<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word | Kulitan Digital Dictionary</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
  <div>
    <div class="home-title" data-i18n="home-title"></div>
    <div class="home-sub" data-i18n="home-sub"></div>
  </div>

  <nav>
    <a href="/index.html" data-i18n="nav-home"></a>
    <a href="/dictionary.html" data-i18n="nav-dictionary"></a>
    <a href="/about.html" data-i18n="nav-about"></a>
    <a href="/contact.html" data-i18n="nav-contact"></a>
  </nav>

  <div class="enkp">
    <button id="langToggle" data-i18n="langToggle"></button>
  </div>
</header>

<main>
  <section class="word-page">
    <div id="word"></div> <!-- This is where the word data will be injected -->
  </section>
</main>

<div class="controls">
  <button id="nightBtn" class="night-btn" data-i18n="nightBtn"></button>
</div>

<footer>
  <p data-i18n="footercreator"></p>
  <p data-i18n="footernote"></p>
</footer>

<script type="module">
import { getWord } from "../js/fetchWords.js";

// Grab the `id` from the URL query string
const params = new URLSearchParams(location.search);
const id = params.get("id");

if (id) {
  getWord(id).then(data => {
    const container = document.getElementById("word");
    if (!data || !container) return;

    container.innerHTML = `
      <div class="card-content">
        <div class="word-kulitan">
          <img src="${data.kulitan}" alt="Kulitan" class="kulitan-vector">
        </div>
        <div class="word-text">
          <h1><strong>Romanized:</strong> ${data.romanized}</h1>
          <p><strong>Meaning:</strong> ${data.meaning}</p>
        </div>
      </div>
    `;
  }).catch(err => console.error("Failed to load word:", err));
} else {
  document.getElementById("word").textContent = "No word ID provided in URL.";
}
</script>

<script src="/js/script.js"></script>
</body>
</html>
