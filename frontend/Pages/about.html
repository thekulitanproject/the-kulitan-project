<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kulitan Digital Dictionary</title>

    <!-- Main stylesheet -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

<!-- =======================
       HEADER AREA
======================= -->  
<header>
  <div>
    <!-- Site title loaded from i18n -->
    <div class="home-title" data-i18n="home-title"></div>
    <!-- Subtitle loaded from i18n -->
    <div class="home-sub" data-i18n="home-sub"></div>
  </div>

  <!-- Navigation links with i18n support -->
  <nav>
    <a href="index.html" data-i18n="nav-home"></a>
    <a href="dictionary.html" data-i18n="nav-dictionary"></a>
    <a href="about.html" data-i18n="nav-about"></a>
    <a href="contact.html" data-i18n="nav-contact"></a>
  </nav>

  <!-- Language toggle button (JS updates its text) -->
  <div class="enkp">
    <button id="langToggle" data-i18n="langToggle"></button>
  </div>
</header>

<!-- =======================
       HERO SECTION
======================= -->
<section class="hero">
  <h1 data-i18n="about-header"></h1>
  <p data-i18n="about-intro"></p>
  
</section>

  <!-- MISSION -->
  <section>
    <h2 data-i18n="about-mission-header"></h2>
    <p data-i18n="about-mission-text"></p>
  </section>

  <!-- WHY IT WAS MADE -->
  <section>
    <h2 data-i18n="about-story-header"></h2>
    <p data-i18n="about-story-text"></p>

  </section>

  <!-- IMPORTANCE -->
  <section>
    <h2 data-i18n="about-importance-header"></h2>
    <p data-i18n="about-importance-text"></p>
  </section>


  
<!-- =======================
       NIGHT MODE BUTTON
======================= -->
<div class="controls">
  <button id="nightBtn" class="night-btn" data-i18n="nightBtn"></button>
</div>

<!-- =======================
       FOOTER
======================= -->
<footer class="footer">
  <p data-i18n="footercreator"></p>
  <p data-i18n="footernote"></p>
</footer>

<!-- Load JavaScript last for faster page load -->
<script src="js/script.js"></script>

</body>
</html>
